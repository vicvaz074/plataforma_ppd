name: Seguridad y calidad

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  WORKING_DIR: app

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare report folder
        run: mkdir -p ../reports/eslint

      - name: Run ESLint
        run: pnpm exec eslint . --ext .js,.jsx,.ts,.tsx --format junit --output-file ../reports/eslint/eslint-junit.xml

      - name: Upload ESLint report
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: reports/eslint

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare report folder
        run: mkdir -p ../reports/semgrep

      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep ci --config auto --json --output ../reports/semgrep/semgrep.json

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: reports/semgrep

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare report folder
        run: mkdir -p ../reports/audit

      - name: Run npm audit (allowlist Electron transitive vulnerabilities)
        run: |
          set +e
          pnpm audit --prod --json > ../reports/audit/npm-audit.json
          audit_exit=$?
          set -e

          node <<'NODE'
          const fs = require('fs');
          const reportPath = '../reports/audit/npm-audit.json';
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

          // Vulnerabilidades transitivas de Electron/electron-builder fuera del alcance del proyecto.
          const ignoredPathFragments = [
            'electron-builder',
            'app-builder-lib',
            '@electron/'
          ];

          const vulnerabilities = Object.values(report.vulnerabilities || {});
          const highOrCritical = vulnerabilities.filter((v) =>
            ['high', 'critical'].includes((v.severity || '').toLowerCase())
          );

          const ignored = [];
          const blocking = [];

          for (const vuln of highOrCritical) {
            const viaEntries = Array.isArray(vuln.via) ? vuln.via : [];
            const hasIgnoredPath = viaEntries.some((entry) => {
              if (!entry || typeof entry !== 'object') return false;
              const nodes = Array.isArray(entry.nodes) ? entry.nodes : [];
              return nodes.some((n) => ignoredPathFragments.some((fragment) => n.includes(fragment)));
            });

            if (hasIgnoredPath) {
              ignored.push({
                name: vuln.name,
                severity: vuln.severity,
                range: vuln.range
              });
            } else {
              blocking.push({
                name: vuln.name,
                severity: vuln.severity,
                range: vuln.range
              });
            }
          }

          fs.writeFileSync(
            '../reports/audit/npm-audit-filtered-summary.json',
            JSON.stringify({ ignored, blocking }, null, 2)
          );

          console.log(`High/Critical detectadas: ${highOrCritical.length}`);
          console.log(`Ignoradas (Electron transitivas): ${ignored.length}`);
          console.log(`Bloqueantes: ${blocking.length}`);

          if (blocking.length > 0) {
            console.error('Se encontraron vulnerabilidades high/critical bloqueantes (fuera de allowlist).');
            process.exit(1);
          }
          NODE

          # Conservamos el comportamiento de fallo solo si realmente hubo bloqueantes tras filtrar.
          # (audit_exit puede ser 1 por vulnerabilidades ignoradas en allowlist)
          echo "pnpm audit exit code original: ${audit_exit}"

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/audit

  unit_tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run --if-present test

  e2e_tests:
    name: E2E tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ${{ env.WORKING_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run end-to-end tests
        run: pnpm run --if-present test:e2e

  summary:
    name: Resumen de seguridad
    runs-on: ubuntu-latest
    needs: [eslint, semgrep, audit, unit_tests, e2e_tests]
    if: ${{ always() }}
    steps:
      - name: Publicar resumen en el run
        run: |
          cat <<'TABLE' >> "$GITHUB_STEP_SUMMARY"
          ### Resumen de seguridad y QA

          | Check | Estado |
          | --- | --- |
          | ESLint | ${{ needs.eslint.result }} |
          | Semgrep | ${{ needs.semgrep.result }} |
          | npm audit | ${{ needs.audit.result }} |
          | Tests unitarios | ${{ needs.unit_tests.result }} |
          | Tests E2E | ${{ needs.e2e_tests.result }} |

          Los reportes de seguridad se adjuntan como artifacts del workflow.
          TABLE

      - name: Publicar resumen en el PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              eslint: '${{ needs.eslint.result }}',
              semgrep: '${{ needs.semgrep.result }}',
              audit: '${{ needs.audit.result }}',
              unit: '${{ needs.unit_tests.result }}',
              e2e: '${{ needs.e2e_tests.result }}'
            };
            const badge = status => status === 'success' ? '✅' : (status === 'skipped' ? '⚪️' : '❌');
            const body = `### Resumen de seguridad y QA\n\n` +
              `| Check | Estado |\n| --- | --- |\n` +
              `| ESLint | ${badge(results.eslint)} ${results.eslint} |\n` +
              `| Semgrep | ${badge(results.semgrep)} ${results.semgrep} |\n` +
              `| npm audit | ${badge(results.audit)} ${results.audit} |\n` +
              `| Tests unitarios | ${badge(results.unit)} ${results.unit} |\n` +
              `| Tests E2E | ${badge(results.e2e)} ${results.e2e} |\n` +
              `\nLos reportes de seguridad se adjuntan como artifacts del workflow.`;
            const { owner, repo, number } = context.issue;
            await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
