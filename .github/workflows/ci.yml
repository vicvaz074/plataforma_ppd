name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Lint
        working-directory: app
        run: pnpm lint

      - name: Semgrep scan
        working-directory: app
        run: pnpm semgrep

      - name: Audit dependencies (allowlist Electron transitives)
        working-directory: app
        run: |
          set +e
          pnpm audit --prod --json > ../npm-audit.json
          audit_exit=$?
          set -e

          node <<'NODE'
          const fs = require('fs');
          const reportPath = '../npm-audit.json';
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));

          // Vulnerabilidades transitivas de Electron/electron-builder fuera del alcance del proyecto.
          const ignoredPathFragments = [
            'electron-builder',
            'app-builder-lib',
            '@electron/'
          ];

          const vulnerabilities = Object.values(report.vulnerabilities || {});
          const highOrCritical = vulnerabilities.filter((v) =>
            ['high', 'critical'].includes((v.severity || '').toLowerCase())
          );

          const ignored = [];
          const blocking = [];

          for (const vuln of highOrCritical) {
            const viaEntries = Array.isArray(vuln.via) ? vuln.via : [];
            const hasIgnoredPath = viaEntries.some((entry) => {
              if (!entry || typeof entry !== 'object') return false;
              const nodes = Array.isArray(entry.nodes) ? entry.nodes : [];
              return nodes.some((n) => ignoredPathFragments.some((fragment) => n.includes(fragment)));
            });

            if (hasIgnoredPath) {
              ignored.push({
                name: vuln.name,
                severity: vuln.severity,
                range: vuln.range
              });
            } else {
              blocking.push({
                name: vuln.name,
                severity: vuln.severity,
                range: vuln.range
              });
            }
          }

          console.log(`High/Critical detectadas: ${highOrCritical.length}`);
          console.log(`Ignoradas (Electron transitivas): ${ignored.length}`);
          console.log(`Bloqueantes: ${blocking.length}`);

          if (blocking.length > 0) {
            console.error('Se encontraron vulnerabilidades high/critical bloqueantes (fuera de allowlist).');
            process.exit(1);
          }
          NODE

          # pnpm audit puede devolver exit code 1 por hallazgos que ya fueron filtrados.
          echo "pnpm audit exit code original: ${audit_exit}"
