name: davara-onprem

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./deploy/env/onprem.env.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-davara_onprem}
      POSTGRES_USER: ${POSTGRES_USER:-davara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-davara}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-davara} -d ${POSTGRES_DB:-davara_onprem}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - davara-internal

  davara-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: davara-governance:onprem
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./deploy/env/onprem.env.example
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://davara.interno}
      NEXT_PUBLIC_ENABLE_EXTERNAL_ASSISTANT: ${NEXT_PUBLIC_ENABLE_EXTERNAL_ASSISTANT:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://davara:davara@postgres:5432/davara_onprem}
      SYNC_BATCH_SIZE: ${SYNC_BATCH_SIZE:-50}
      SYNC_RETRY_INTERVAL_MS: ${SYNC_RETRY_INTERVAL_MS:-15000}
    expose:
      - "3000"
    volumes:
      - ./deploy/runtime/uploads:/app/uploads
      - ./deploy/runtime/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - davara-internal

  backup-runner:
    build:
      context: .
      dockerfile: ./deploy/backup/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./deploy/env/onprem.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://davara:davara@postgres:5432/davara_onprem}
      BACKUP_OUTPUT_DIR: /workspace/deploy/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-43200}
    volumes:
      - ./deploy/backups:/workspace/deploy/backups
      - ./deploy/runtime/uploads:/workspace/deploy/runtime/uploads:ro
      - ./deploy/runtime/logs:/workspace/deploy/runtime/logs:ro
      - ./deploy/env:/workspace/deploy/env:ro
      - ./deploy/nginx:/workspace/deploy/nginx:ro
      - ./scripts:/workspace/scripts:ro
    command: ["/bin/sh", "/workspace/deploy/backup/backup-runner.sh"]
    security_opt:
      - no-new-privileges:true
    networks:
      - davara-internal

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      davara-app:
        condition: service_healthy
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/onprem.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/runtime/nginx-logs:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    networks:
      - davara-internal

networks:
  davara-internal:
    driver: bridge

volumes:
  postgres-data:
